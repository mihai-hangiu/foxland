name: Fetch Price History

on:
  schedule:
    - cron: '30 21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-history:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests yfinance

      - name: Fetch price history
        run: python fetch_price_history.py

      - name: Show result summary
        run: |
          if [ -f prices_history.json ]; then
            echo "prices_history.json created OK"
            python -c "
import json
with open('prices_history.json') as f: d = json.load(f)
tickers = d.get('tickers', {})
errors  = d.get('errors', [])
print(f'  Tickers with data: {len(tickers)}')
print(f'  Errors: {len(errors)}')
if errors: print(f'  Failed: {[e[\"ticker\"] for e in errors]}')
"
          else
            echo "ERROR: prices_history.json was NOT created"
            exit 1
          fi

      - name: Commit and push prices_history.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices_history.json
          git diff --cached --quiet || git commit -m "chore: update price history $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
