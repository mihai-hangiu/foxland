<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trade Summary Report</title>
<style>
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        margin: 30px;
        background: #fff;
        color: #222;
    }
    h1 {
        font-size: 22px;
        font-weight: 600;
        margin-bottom: 20px;
    }
    table {
        border-collapse: collapse;
        width: 100%;
        font-size: 13px;
    }
    th {
        background: #2c3e50;
        color: #fff;
        padding: 8px 10px;
        text-align: left;
        font-weight: 600;
        white-space: nowrap;
    }
    th.sortable {
        cursor: pointer;
        user-select: none;
    }
    th.sortable:hover {
        background: #3d5166;
    }
    th .sort-arrow {
        margin-left: 4px;
        font-size: 10px;
        opacity: 0.5;
    }
    th .sort-arrow.active {
        opacity: 1;
    }
    td {
        padding: 6px 10px;
        border-bottom: 1px solid #e0e0e0;
        white-space: nowrap;
    }
    tr.row-even { background: #ffffff; }
    tr.row-odd  { background: #f5f5f5; }
    tr:hover td { background: #e8f0fe; }

    td.action-buy  { color: #1a7f37; font-weight: 600; }
    td.action-sell { color: #cf222e; font-weight: 600; }
    td.upside-pos  { color: #1a7f37; }
    td.upside-neg  { color: #cf222e; }

    .footer {
        margin-top: 16px;
        font-size: 12px;
        color: #888;
    }
</style>
</head>
<body>
<h1>Trade Summary Report</h1>
<p>5 trade(s). Click <b>Date</b> or <b>Ticker</b> to sort.</p>
<table id="tradesTable">
<thead>
<tr>
  <th class="sortable" data-sort="date">Date <span class="sort-arrow" id="arrow-date">&#9660;</span></th>
  <th class="sortable" data-sort="ticker">Ticker <span class="sort-arrow" id="arrow-ticker">&#9660;</span></th>
  <th>Action</th>
  <th style="text-align:right">Shares</th>
  <th style="text-align:right">Price</th>
  <th style="text-align:right">Portfolio %</th>
  <th style="text-align:right">Accum. Below</th>
  <th style="text-align:right">Sell Above Min</th>
  <th style="text-align:right">Sell Above Max</th>
  <th style="text-align:right">Price 29-Apr</th>
  <th style="text-align:right">Upside</th>
  <th>Risk</th>
  <th style="text-align:right">Position Value</th>
  <th>Term / Sell Info</th>
</tr>
</thead>
<tbody id="tradesBody">
</tbody>
</table>
<p class="footer">Generated by gen_report.py from trades_data.json</p>

<script>
const tradesData = [{"date": "2026-03-15", "ticker": "POWL", "action": "SELL", "shares": "88", "price": "454.0", "_portfolio_pct_fmt": "", "_accumulate_below_fmt": "", "_sell_above_min_fmt": "", "_sell_above_max_fmt": "", "_current_price": "$510.00", "_upside": "", "risk": "", "_position_value_fmt": "", "_last_col": "full sale, +120%"}, {"date": "2026-02-18", "ticker": "ERO", "action": "BUY", "shares": "50", "price": "30.2", "_portfolio_pct_fmt": "1.69%", "_accumulate_below_fmt": "35", "_sell_above_min_fmt": "65", "_sell_above_max_fmt": "75", "_current_price": "$28.45", "_upside": "+146%", "risk": "7/10", "_position_value_fmt": "11k", "_last_col": "18-24"}, {"date": "2026-02-10", "ticker": "MSFT", "action": "SELL", "shares": "30", "price": "420.5", "_portfolio_pct_fmt": "", "_accumulate_below_fmt": "", "_sell_above_min_fmt": "", "_sell_above_max_fmt": "", "_current_price": "$445.20", "_upside": "", "risk": "5/10", "_position_value_fmt": "25k", "_last_col": "partial sale, +35%"}, {"date": "2026-02-04", "ticker": "CRDO", "action": "BUY", "shares": "80", "price": "100.5", "_portfolio_pct_fmt": "2.3%", "_accumulate_below_fmt": "90", "_sell_above_min_fmt": "150", "_sell_above_max_fmt": "180", "_current_price": "$87.30", "_upside": "+89%", "risk": "6/10", "_position_value_fmt": "8k", "_last_col": "12-18"}, {"date": "2026-01-06", "ticker": "AAPL", "action": "BUY", "shares": "100", "price": "175.3", "_portfolio_pct_fmt": "5.1%", "_accumulate_below_fmt": "160", "_sell_above_min_fmt": "220", "_sell_above_max_fmt": "250", "_current_price": "$212.50", "_upside": "+11%", "risk": "6/10", "_position_value_fmt": "18k", "_last_col": "12-18"}];
const keys = ["date", "ticker", "action", "shares", "price", "_portfolio_pct_fmt", "_accumulate_below_fmt", "_sell_above_min_fmt", "_sell_above_max_fmt", "_current_price", "_upside", "risk", "_position_value_fmt", "_last_col"];
const aligns = ["left", "left", "left", "right", "right", "right", "right", "right", "right", "right", "right", "left", "right", "left"];

// Sort state: { column, ascending }
let sortState = { column: 'date', ascending: false };

function renderTable(data) {
    const tbody = document.getElementById('tradesBody');
    tbody.innerHTML = '';
    data.forEach((row, idx) => {
        const tr = document.createElement('tr');
        tr.className = idx % 2 === 0 ? 'row-even' : 'row-odd';

        keys.forEach((key, colIdx) => {
            const td = document.createElement('td');
            td.textContent = row[key] || '';

            // Right-align numeric columns
            if (aligns[colIdx] === 'right') {
                td.style.textAlign = 'right';
            }

            if (key === 'action') {
                if (row[key] === 'BUY')  td.className = 'action-buy';
                if (row[key] === 'SELL') td.className = 'action-sell';
            }
            if (key === '_upside' && row[key]) {
                if (row[key].startsWith('+')) td.className = 'upside-pos';
                if (row[key].startsWith('-')) td.className = 'upside-neg';
                if (aligns[colIdx] === 'right') td.style.textAlign = 'right';
            }

            tr.appendChild(td);
        });

        tbody.appendChild(tr);
    });
}

function sortTable(column) {
    // Toggle direction: Date defaults desc-first, Ticker defaults asc-first
    if (sortState.column === column) {
        sortState.ascending = !sortState.ascending;
    } else {
        sortState.column = column;
        sortState.ascending = (column === 'ticker');
    }

    const sorted = [...tradesData].sort((a, b) => {
        let va = a[column] || '';
        let vb = b[column] || '';
        if (va === 'UNKNOWN') return 1;
        if (vb === 'UNKNOWN') return -1;
        let cmp = va.localeCompare(vb);
        return sortState.ascending ? cmp : -cmp;
    });

    // Update sort arrows
    document.querySelectorAll('.sort-arrow').forEach(el => {
        el.classList.remove('active');
        el.textContent = '\u25BC';
    });
    const arrow = document.getElementById('arrow-' + column);
    if (arrow) {
        arrow.classList.add('active');
        arrow.textContent = sortState.ascending ? '\u25B2' : '\u25BC';
    }

    renderTable(sorted);
}

// Click handlers
document.querySelectorAll('th.sortable').forEach(th => {
    th.addEventListener('click', () => sortTable(th.dataset.sort));
});

// Initial render sorted by date desc
sortTable('date');
</script>

</body>
</html>
